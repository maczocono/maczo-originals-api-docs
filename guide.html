<!doctype html><html lang=en><head><meta charset=utf-8>
<meta name=viewport content="width=device-width, initial-scale=1"><title>maczo docs — guide</title>
<style>body{margin:0;background:#0F212E;color:#cfe3f2;font-family:'Bai Jamjuree',system-ui,sans-serif}
main{max-width:820px;margin:0 auto;padding:26px}a{color:#1FFF20}pre,code{background:#0a1620;border-radius:6px}
pre{padding:12px;overflow:auto;color:#cfe3f2}table{border-collapse:collapse}td,th{border:1px solid #24455c;padding:6px 10px}
h1,h2,h3{color:#fff}</style>
<script src="https://unpkg.com/marked@12/marked.min.js"></script></head><body><main id=doc></main>
<script>const f=new URLSearchParams(location.search).get('doc');
fetch(f).then(r=>r.text()).then(t=>{document.getElementById('doc').innerHTML=marked.parse(t);});</script>
</body></html>
